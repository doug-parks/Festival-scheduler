name: ci

# NOTE: The `static`, `vitest`, `integration`, and `e2e` jobs are temporarily
# disabled (via `if: false`) per user request 2026-05-20 while the CI setup
# issue is debugged. These checks pass locally (`pnpm typecheck`, `pnpm lint`,
# `pnpm test`) but fail in CI due to a setup-step issue. Re-enable once the
# issue #14 follow-up lands.

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  noop:
    name: ci disabled (placeholder)
    runs-on: ubuntu-latest
    steps:
      - run: echo "CI jobs temporarily disabled - see workflow file header."

  static:
    name: typecheck + lint
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

  vitest:
    name: unit + component tests
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage --project unit --project component
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  integration:
    name: supabase integration
    runs-on: ubuntu-latest
    # Disabled per user request 2026-05-20.
    if: false
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      INTEGRATION_DATABASE_URL: postgres://postgres:postgres@localhost:5432/fest_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    # Disabled per user request 2026-05-20.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium webkit
      - name: Run Playwright
        run: pnpm test:e2e
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
